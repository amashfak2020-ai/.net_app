name: Multi-Project .NET Build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        project: [Project1, Project2, Project3]  # Update with your actual project names
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: '6.0.x'  # Specify your .NET version

      - name: Restore NuGet Packages
        run: dotnet restore ${{ matrix.project }}.csproj
        working-directory: ${{ matrix.project }}

      - name: Build
        run: dotnet build --no-restore ${{ matrix.project }}.csproj
        working-directory: ${{ matrix.project }}

      - name: Run Unit Tests
        run: dotnet test --no-build ${{ matrix.project }}.csproj
        working-directory: ${{ matrix.project }}

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner begin /k:"my_project_key" /d:sonar.login=$SONAR_TOKEN
        working-directory: ${{ matrix.project }}

      - name: Build with Sonar
        run: dotnet build --no-restore ${{ matrix.project }}.csproj
        working-directory: ${{ matrix.project }}

      - name: End SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.login=$SONAR_TOKEN
        working-directory: ${{ matrix.project }}

      - name: Snyk Security Check
        uses: snyk/actions/github@v2
        with:
          command: test
          args: --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: JFrog Upload
        run: jfrog rt u "${{ matrix.project }}/*.dll" "my-repo/path/to/upload/" --url="<JFROG_URL>" --user="<JFROG_USER>" --password="${{ secrets.JFROG_PASSWORD }}"
